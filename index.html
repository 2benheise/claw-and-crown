    <style>
      * {
        margin: 0;
        padding: 0;
        -moz-box-sizing: border-box;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      body {
        padding: 20px;
        text-align: left;
        font-family: Arial;
        color: #fff;
        background: #ffff;
        overflow: hidden;
      }

      iframe {
        overflow: auto;
        overflow-x: hidden;
      }

      h1 {
        font-weight: normal;
        font-size: 40px;
        font-weight: normal;
        text-transform: uppercase;
        float: left;
        margin: 20px 0 100px 10px;
      }
      h1 span {
        font-size: 13px;
        display: block;
        padding-left: 4px;
      }

      .tabs {
        width: 650px;
        float: none;
        list-style: none;
        position: relative;
        margin: 80px 0 0 10px;
        text-align: left;
        margin: 0 auto;
      }
      .tabs li {
        float: left;
        display: block;
      }
      .tabs input[type="radio"] {
        position: absolute;
        top: 0;
        left: -9999px;
      }
      .tabs label {
        display: block;
        padding: 14px 21px;
        border-radius: 2px 2px 0 0;
        font-size: 20px;
        font-weight: normal;
        text-transform: uppercase;
        background: #999;
        border: 1px solid #999;
        color: #fff;
        border-bottom: 0;
        cursor: pointer;
        position: relative;
        top: 4px;
        -moz-transition: all 0.2s ease-in-out;
        -o-transition: all 0.2s ease-in-out;
        -webkit-transition: all 0.2s ease-in-out;
        transition: all 0.2s ease-in-out;
      }
      .tabs label:hover {
        background: #ccc;
      }
      .tabs .tab-content {
        z-index: 2;
        display: none;
        overflow: hidden;
        width: 100%;
        font-size: 17px;
        line-height: 25px;
        padding: 0;
        position: absolute;
        top: 53px;
        left: 0;
        background: transparent;
        border: 1px solid #999;
        height: 800px;
        color: #999;
        overflow: auto;
        overflow-x: hidden;
      }
      .tabs [id^="tab"]:checked + label {
        top: 0;
        padding-top: 17px;
        background: #fff;
        border: 1px solid #999;
        border-bottom: 0;
        color: #666;
        z-index: 3;
      }
      .tabs [id^="tab"]:checked ~ [id^="tab-content"] {
        display: block;
      }

      p.link {
        clear: both;
        margin: 380px 0 0 15px;
      }
      p.link a {
        text-transform: uppercase;
        text-decoration: none;
        display: inline-block;
        color: #fff;
        padding: 5px 10px;
        margin: 0 5px;
        background-color: #612e76;
        -moz-transition: all 0.2s ease-in;
        -o-transition: all 0.2s ease-in;
        -webkit-transition: all 0.2s ease-in;
        transition: all 0.2s ease-in;
      }
      p.link a:hover {
        background-color: #522764;
      }
    </style>
