    <style>
      /* start 1x1 grid */
      .grid-overlay {
        /* background-color: #999; */
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 0;
        width: 400px;
        height: 300px;
        position: absolute;
        z-index: 0;
      }

      .grid-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 0; /* Sit beneath the label text */
        padding: 5px;
        width: 540px; /* Updated width */
        height: 230px; /* Updated height */
        /* background-color: #f4f4f4; */
        opacity: 0.5;
      }

      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .cell input[type='checkbox'] {
        position: absolute;
        width: 20px;
        height: 20px;
        opacity: 0; /* Hide checkboxes */
      }

      .cell label {
        font-size: 14px;
        z-index: 0; /* Ensure label is on top of the grid */
        background-color: transparent;
        background-image: var(--cabinet-1x1);
        background-repeat: no-repeat;
        background-size: 100% 100%;
        background-position: calc(var(--sprite-x) * -100%) calc(var(--sprite-y) * -100%);
      }
      /* end 1x1 grid */
    </style>
    <style>
      /* start 8x1 grid */
      .checkbox-grid {
        position: absolute;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 0;
        width: 400px;
        height: 300px;
        top: 0;
        left: 0;
        z-index: 2000;
        display: none;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        cursor: pointer;
        position: relative;
      }

      .checkbox-item input {
        margin-right: 5px;
        opacity: 0;
      }

      label {
        width: 100%;
